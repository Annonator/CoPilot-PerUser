version: 2

multi-ecosystem-groups:
  monthly-dependencies:
    schedule:
      interval: "monthly"

updates:
  - package-ecosystem: "npm"
    directory: "/src/web"
    patterns:
      - "*"
    multi-ecosystem-group: "monthly-dependencies"

  - package-ecosystem: "gomod"
    directory: "/src/api"
    patterns:
      - "*"
    multi-ecosystem-group: "monthly-dependencies"

  - package-ecosystem: "docker"
    directory: "/src/web"
    patterns:
      - "*"
    multi-ecosystem-group: "monthly-dependencies"

  - package-ecosystem: "docker"
    directory: "/src/api"
    patterns:
      - "*"
    multi-ecosystem-group: "monthly-dependencies"

  - package-ecosystem: "docker-compose"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "monthly-dependencies"
