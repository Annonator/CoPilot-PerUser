name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/api/go.mod
          cache-dependency-path: src/api/go.mod

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    env:
      AUTH_SECRET: ci-auth-secret-ci-auth-secret-ci-auth
      APP_TOKEN_SECRET: ci-app-token-secret-ci-app-token-secret
      AUTH_GOOGLE_ID: ci-google-client-id
      AUTH_GOOGLE_SECRET: ci-google-client-secret
      COMPANY_EMAIL_DOMAINS: company.name
      API_BASE_URL: http://127.0.0.1:8080
      WEB_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  containers:
    name: Containers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: src/api
          file: src/api/Dockerfile
          push: false

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: src/web
          file: src/web/Dockerfile
          push: false
